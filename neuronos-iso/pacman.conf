#
# NeuronOS Pacman Configuration
#

[options]
HoldPkg     = pacman glibc
Architecture = auto
Color
CheckSpace
ParallelDownloads = 5
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

# Core Arch repositories
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

# NeuronOS custom repository (to be configured)
# [neuronos]
# SigLevel = Optional TrustAll
# Server = https://repo.neuronos.org/$arch
