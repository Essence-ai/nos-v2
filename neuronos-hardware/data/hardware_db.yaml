quirks:
  # NVIDIA-wide quirks
  - vendor_id: "10de"
    device_id: null  # Applies to all NVIDIA GPUs
    description: "NVIDIA Code 43 error in VM"
    workaround: "Enable <kvm><hidden state='on'/> and use fake vendor_id in domain XML."
    severity: "warning"

  # AMD reset bug
  - vendor_id: "1002"
    device_id: null  # Applies to many AMD GPUs
    description: "AMD GPU reset bug prevents clean VM restarts"
    workaround: "Install vendor-reset kernel module from https://github.com/gnif/vendor-reset"
    severity: "warning"

  # Intel Arc
  - vendor_id: "8086"
    device_id: "56a0"
    description: "Intel Arc driver support is evolving"
    workaround: "Use latest kernel (6.6+) for best compatibility."
    severity: "info"
