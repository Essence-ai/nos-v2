# NeuronOS Installer Configuration
# Based on Calamares settings

# Modules shown to the user (with UI)
sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - networkcfg
    - users
    - packages
    - neuronhwdetect      # NeuronOS: Detect GPUs and IOMMU
    - neuronvfio          # NeuronOS: Write VFIO configs
    - neuronbtrfs         # NeuronOS: Setup snapper
    - neuronpostinstall   # NeuronOS: Copy binaries, packages, services to target
    - bootloader
    - neuronvmsetup       # NeuronOS: VM template download prompt
    - finished

# Branding settings
branding: neuronos

# Prompt before installation
prompt-install: true

# Don't allow going back after exec phase
dont-chroot: false

# Installation requirements
required-storage-gib: 50
required-ram-gib: 4

# Debug mode
debug: false
